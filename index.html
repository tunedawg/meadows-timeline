<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meadows v. Washington University — Employee Tenure Timeline</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #5d6677;
      --paper: #ffffff;
      --line: rgba(23, 32, 51, 0.14);
      --accent: #2563eb;
      --gold: #d69e2e;
      --red: #b4232f;
      --shadow: 0 16px 40px rgba(18, 24, 38, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef1f6;
      overflow-x: hidden;
    }

    main {
      width: min(1220px, calc(100vw - 20px));
      margin: 10px auto;
    }

    .stage {
      position: relative;
      min-height: calc(100vh - 20px);
      padding: 18px 28px 14px;
      border: 1px solid rgba(23, 32, 51, 0.16);
      border-radius: 6px;
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage:fullscreen {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      border-radius: 0;
      padding: 14px 24px 18px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stage:fullscreen .chart-wrap {
      margin: 0;
      padding: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .stage:fullscreen svg {
      width: min(99vw, calc((100vh - 48px) * 1.9063));
      max-width: 99vw;
      max-height: calc(100vh - 48px);
    }

    .stage:fullscreen header {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(96vw, 1220px);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: none;
    }

    header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3.4vw, 44px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      min-width: 0;
    }

    .controls.hidden {
      display: none;
    }

    .show-controls {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 5;
      height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(36, 48, 67, 0.14);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.94);
      color: rgba(36, 48, 67, 0.78);
      font: 800 11px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 8px 22px rgba(36, 48, 67, 0.08);
      cursor: pointer;
    }

    .show-controls.hidden {
      display: none;
    }

    button, .upload, select {
      height: 36px;
      border: 1px solid rgba(36, 48, 67, 0.16);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      padding: 0 16px;
      font: 700 13px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 8px 24px rgba(36, 48, 67, 0.08);
    }

    button, .upload, select { cursor: pointer; }

    select { padding-right: 34px; }

    button.primary {
      border: 0;
      color: white;
      background: #24364f;
      min-width: 132px;
      font-size: 14px;
    }

    .upload {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .upload input { display: none; }

    .chart-wrap {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      padding: 8px 14px 0 0;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .axis text, .names text, .bar-label {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .axis text {
      fill: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .grid {
      stroke: var(--line);
      stroke-width: 1;
    }

    .era-green {
      fill: rgba(4, 120, 87, 0.03);
    }

    .era-yellow {
      fill: rgba(217, 119, 6, 0.04);
    }

    .era-red {
      fill: rgba(180, 35, 47, 0.03);
    }

    .now-line {
      stroke: #243043;
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.72;
    }

    .year-pill {
      fill: #1e293b;
      filter: drop-shadow(0 4px 14px rgba(18, 24, 38, 0.14));
    }

    .year-text {
      fill: #ffffff;
      font-size: 26px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0;
    }

    .name {
      fill: #344054;
      font-size: 15px;
      font-weight: 800;
    }

    .duration {
      fill: #697386;
      font-size: 12px;
      font-weight: 700;
    }

    .track {
      fill: rgba(36, 48, 67, 0.07);
    }

    .bar {
      filter: none;
    }

    .legacy-dim {
      opacity: 0.22;
      transition: opacity 220ms ease;
    }

    .keeper-glow {
      filter: none;
    }

    .meadows-halo {
      filter: drop-shadow(0 0 10px rgba(184, 135, 34, 0.45));
    }

    .bar-label {
      fill: white;
      font-size: 12px;
      font-weight: 900;
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
    }

    .bar-label.visible { opacity: 1; }

    .bar-label.legacy-dim { opacity: 0.18; }

    .icon-shell {
      filter: drop-shadow(0 6px 8px rgba(18, 24, 38, 0.18));
    }

    .icon-ring {
      fill: #ffffff;
      stroke: rgba(23, 32, 51, 0.40);
      stroke-width: 2.5;
    }

    .icon-accent {
      fill: none;
      stroke: rgba(23, 32, 51, 0.22);
      stroke-width: 2;
      stroke-linejoin: round;
    }

    .icon-image {
      image-rendering: auto;
    }

    .blast-ring {
      fill: none;
      stroke: rgba(180, 35, 47, 0.52);
      stroke-width: 8;
      stroke-linecap: round;
    }

    .game-over {
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      fill: #c5162e;
      stroke: rgba(255, 255, 255, 0.92);
      stroke-width: 5;
      paint-order: stroke fill;
      font-size: 104px;
      letter-spacing: 0;
      text-anchor: middle;
      dominant-baseline: middle;
      filter: drop-shadow(0 18px 24px rgba(102, 0, 0, 0.34));
    }

    .game-over-hint {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #761622;
      font-size: 20px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0;
    }

    .game-over-veil {
      fill: rgba(255, 245, 245, 0.74);
    }

    .final-title {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #172033;
      font-size: 32px;
      font-weight: 950;
      text-anchor: middle;
      letter-spacing: 0;
    }

    .final-subtitle,
    .final-hint {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #5d6677;
      font-size: 15px;
      font-weight: 800;
      text-anchor: middle;
    }

    .final-year {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #ffffff;
      font-size: 16px;
      font-weight: 950;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .final-label {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #202b3d;
      font-size: 13px;
      font-weight: 850;
    }

    .final-card-title {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #172033;
      font-size: 15px;
      font-weight: 950;
    }

    .final-card-date {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #5d6677;
      font-size: 12px;
      font-weight: 900;
    }

    .final-note {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #697386;
      font-size: 11px;
      font-weight: 800;
      text-anchor: middle;
    }

    .phase-veil {
      fill: rgba(248, 250, 252, 0.95);
    }

    .phase-title {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #172033;
      font-size: 38px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: -0.3px;
    }

    .phase-title.long {
      font-size: 30px;
    }

    .phase-hint {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: rgba(23, 32, 51, 0.52);
      font-size: 16px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .phase-card-name {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      fill: #172033;
      font-size: 20px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .backdrop-blur {
      filter: blur(5px) saturate(0.72);
      opacity: 0.34;
    }

    .timeline-x line,
    .phase-x line {
      stroke: #b4232f;
      stroke-linecap: round;
    }

    .timeline-x line {
      stroke-width: 3.5;
    }

    .phase-x line {
      stroke-width: 9;
    }

    @media (max-width: 860px) {
      main { width: min(100vw - 16px, 1280px); margin: 8px auto; }
      .stage { padding: 22px 16px; border-radius: 14px; }
      header { flex-direction: column; }
      .controls { justify-content: flex-start; min-width: 0; }
      .chart-wrap { overflow-x: auto; padding-bottom: 12px; }
      svg { min-width: 980px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage">
      <header>
        <div class="controls" aria-label="Timeline controls">
          <button class="primary" id="playPause" type="button">Start / Space</button>
          <button id="restart" type="button">Restart</button>
          <button id="fullscreenBtn" type="button">Fullscreen</button>
          <button id="hideControlsBtn" type="button">Hide Controls</button>
          <select id="iconPerson" aria-label="Select person for icon upload">
            <option value="Vanessa Meadows">Vanessa Meadows</option>
            <option value="Patricia Switzer">Patricia Switzer</option>
            <option value="Peggyann Guerrero">Peggyann Guerrero</option>
            <option value="April Johnson">April Johnson</option>
            <option value="Cozetta Stokes">Cozetta Stokes</option>
            <option value="Doritha Daniel">Doritha Daniel</option>
            <option value="Jenifer Ellner">Jenifer Ellner</option>
            <option value="Kimberlee Hanewinkel">Kimberlee Hanewinkel</option>
            <option value="Cody Dayton">Cody Dayton</option>
            <option value="Kortnie Sronce">Kortnie Sronce</option>
          </select>
          <label class="upload">
            Upload selected icon
            <input id="iconUpload" type="file" accept="image/*" />
          </label>
        </div>
        <button class="show-controls hidden" id="showControlsBtn" type="button">Show Controls Ctrl+H</button>
      </header>

      <div class="chart-wrap">
        <svg id="chart" viewBox="0 0 1220 640" role="img" aria-labelledby="chartTitle chartDesc">
          <title id="chartTitle">Animated employee tenure timeline</title>
          <desc id="chartDesc">Horizontal bars show employee tenure from 1977 through 2024, animated to illustrate the departure of five long-tenure employees in 2022 following Vanessa Meadows' wrongful termination.</desc>
          <defs>
            <clipPath id="softClip"><rect x="0" y="0" width="1220" height="590" rx="18"/></clipPath>
            <clipPath id="iconCircleClip" clipPathUnits="userSpaceOnUse">
              <circle cx="0" cy="0" r="26"/>
            </clipPath>
            <clipPath id="iconFeatureCircleClip" clipPathUnits="userSpaceOnUse">
              <circle cx="0" cy="0" r="36"/>
            </clipPath>
            <!-- loyal long-tenure employees: blues and teals -->
            <linearGradient id="g0" x1="0" x2="1"><stop stop-color="#1e40af"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
            <linearGradient id="g1" x1="0" x2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
            <linearGradient id="g2" x1="0" x2="1"><stop stop-color="#1d4ed8"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
            <linearGradient id="g3" x1="0" x2="1"><stop stop-color="#0369a1"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
            <linearGradient id="g4" x1="0" x2="1"><stop stop-color="#115e59"/><stop offset="1" stop-color="#0d9488"/></linearGradient>
            <!-- antagonists: reds and dark slate -->
            <linearGradient id="g5" x1="0" x2="1"><stop stop-color="#991b1b"/><stop offset="1" stop-color="#dc2626"/></linearGradient>
            <linearGradient id="g6" x1="0" x2="1"><stop stop-color="#7f1d1d"/><stop offset="1" stop-color="#b91c1c"/></linearGradient>
            <linearGradient id="g7" x1="0" x2="1"><stop stop-color="#292524"/><stop offset="1" stop-color="#78716c"/></linearGradient>
            <!-- Vanessa: gold -->
            <linearGradient id="g8" x1="0" x2="1"><stop stop-color="#b45309"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
            <!-- Kortnie Sronce: slate blue-gray -->
            <linearGradient id="g9" x1="0" x2="1"><stop stop-color="#334155"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
          </defs>
          <g id="story"></g>
          <g id="grid" class="axis"></g>
          <g id="bars"></g>
          <g id="icons"></g>
          <g id="yearBadge">
            <rect class="year-pill" x="30" y="544" width="148" height="44" rx="10"/>
            <text class="year-text" id="yearText" x="104" y="566">1977</text>
          </g>
          <g id="effects"></g>
        </svg>
      </div>
    </section>
  </main>

  <script>
    const employees = [
      { name: "Vanessa Meadows", start: 1999, end: 2022, exitYear: 2022.9, gradient: "g8", featured: true },
      { name: "Patricia Switzer", start: 1977, end: 2022, exitYear: 2022.08, gradient: "g0" },
      { name: "Peggyann Guerrero", start: 1992, end: 2022, exitYear: 2022.75, gradient: "g1" },
      { name: "April Johnson", start: 1992, end: 2022, exitYear: 2022.87, gradient: "g2" },
      { name: "Cozetta Stokes", start: 2001, end: 2022, exitYear: 2022.38, gradient: "g3" },
      { name: "Doritha Daniel", start: 2001, end: 2019, exitYear: 2019.22, gradient: "g4" },
      { name: "Jenifer Ellner", start: 2018, end: 2026, gradient: "g5" },
      { name: "Kimberlee Hanewinkel", start: 2022, end: 2026, gradient: "g6" },
      { name: "Cody Dayton", start: 2021, end: 2026, gradient: "g7" },
      { name: "Kortnie Sronce", start: 2022.83, end: 2024, gradient: "g9" }
    ];

    const stage = document.querySelector(".stage");
    const svg = document.getElementById("chart");
    const grid = document.getElementById("grid");
    const story = document.getElementById("story");
    const bars = document.getElementById("bars");
    const icons = document.getElementById("icons");
    const effects = document.getElementById("effects");
    const yearText = document.getElementById("yearText");
    const playPause = document.getElementById("playPause");
    const restart = document.getElementById("restart");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const hideControlsBtn = document.getElementById("hideControlsBtn");
    const showControlsBtn = document.getElementById("showControlsBtn");
    const controls = document.querySelector(".controls");
    const upload = document.getElementById("iconUpload");
    const iconPerson = document.getElementById("iconPerson");

    const minYear = 1977;
    const maxYear = 2024;
    const focusStartYear = 2020;
    const focusEndYear = 2024;
    const plot = { left: 220, right: 1160, top: 62, rowGap: 48, barHeight: 19 };
    const segments = [
      { from: 1977, to: 1999, ms: 5000 },   // cumulative:  5000  (227ms/yr)
      { from: 1999, to: 2018, ms: 7500 },   // cumulative: 12500  (395ms/yr — 1.7× slower, smooth)
      { from: 2018, to: 2019, ms: 1800 },   // cumulative: 14300  (pause follows at 2018)
      { from: 2019, to: 2021, ms: 3600 },   // cumulative: 17900  (1800ms/yr — same rate)
      { from: 2021, to: 2022, ms: 2400 },   // cumulative: 20300  (2400ms/yr — gradual decel)
      { from: 2022, to: 2023, ms: 4500 },   // cumulative: 24800  (4500ms/yr — final act)
      { from: 2023, to: 2024, ms: 4000 }    // cumulative: 28800  (4000ms/yr — nearly same)
    ];
    const durationMs = segments.reduce((sum, segment) => sum + segment.ms, 0);
    const phaseStops = [
      { year: 2018, elapsed: 12500, event: "jen", title: "2018: Jenifer Ellner Becomes Revenue Cycle Director", people: ["Jenifer Ellner"], variant: "omen" },
      { year: 2019, elapsed: 14300, title: "2019", people: ["Jenifer Ellner", "Doritha Daniel"], variant: "center" },
      { year: 2019, elapsed: 14300, title: "2019: Ellner Terminates Doritha Daniel", people: ["Jenifer Ellner", "Doritha Daniel"], variant: "fade-doritha" },
      { year: 2021, elapsed: 17900, event: "kim-cody", title: "2021: Cody Dayton Joins Orthopedics", people: ["Cody Dayton"], variant: "omen" },
      { year: 2022, elapsed: 20300, event: "kim-cody", title: "2022: Kimberlee Hanewinkel Joins Orthopedics", people: ["Kimberlee Hanewinkel"], variant: "omen" },
      { year: 2022.98, elapsed: 24710, event: "legacy-exit", title: "", people: [], variant: "firing-blast" },
      { year: 2022.98, elapsed: 24710, title: "June–July 2022: Five Long-Tenure Employees Depart", people: ["Vanessa Meadows", "Patricia Switzer", "Peggyann Guerrero", "April Johnson", "Cozetta Stokes"], variant: "firing" },
      { year: 2022.98, elapsed: 24710, title: ["June 17, 2022: Washington University", "terminates Vanessa Meadows", "after 23 years of service."], people: ["Vanessa Meadows"], variant: "vanessa-fired" },
      { year: 2022.98, elapsed: 24710, title: ["November 2022: Kortnie Sronce Joins Orthopedics", "Five months after Vanessa Meadows' termination."], people: ["Kortnie Sronce"], variant: "omen" }
    ];
    const iconDataUrls = {};
    const storageKey = "employee-tenure-timeline-icons-v1";
    const iconFrameStyle = "circle";
    let playing = false;
    let startTime = performance.now();
    let pausedAt = performance.now();
    let ended = false;
    let currentElapsed = 0;
    let phaseIndex = 0;
    let activePhase = null;
    let blastStartTime = null;
    let blastComplete = false;
    let hasStarted = false;
    let displayYear = minYear;
    let focusLocked = false;
    let finalTimelineShown = false;

    const ns = "http://www.w3.org/2000/svg";
    const make = (tag, attrs = {}) => {
      const el = document.createElementNS(ns, tag);
      for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
      return el;
    };

    function historyXForYear(year) {
      const cappedYear = Math.min(year, maxYear);
      return plot.left + ((cappedYear - minYear) / (maxYear - minYear)) * (plot.right - plot.left);
    }

    function focusXForYear(year) {
      const clampedYear = clamp(year, focusStartYear, focusEndYear);
      const width = plot.right - plot.left;
      if (clampedYear <= 2021) {
        return plot.left + ((clampedYear - 2020) / 1) * width * 0.16;
      }
      if (clampedYear <= 2022) {
        return plot.left + width * 0.16 + ((clampedYear - 2021) / 1) * width * 0.22;
      }
      if (clampedYear <= 2023) {
        return plot.left + width * 0.38 + ((clampedYear - 2022) / 1) * width * 0.44;
      }
      return plot.left + width * 0.82 + ((clampedYear - 2023) / 1) * width * 0.18;
    }

    function xForYear(year) {
      return focusLocked ? focusXForYear(year) : historyXForYear(year);
    }

    function isFocusMode() {
      return focusLocked;
    }

    function tenureEndYear(emp) {
      return emp.exitYear || emp.end;
    }

    function visibleRangeForEmployee(emp) {
      if (!focusLocked) return { start: emp.start, end: emp.end, visible: true };
      const start = Math.max(emp.start, focusStartYear);
      const end = Math.min(tenureEndYear(emp), focusEndYear);
      return { start, end, visible: end >= start };
    }

    function timelineState(elapsed) {
      let cursor = 0;
      for (const segment of segments) {
        if (elapsed <= cursor + segment.ms) {
          const local = (elapsed - cursor) / segment.ms;
          return {
            year: segment.from + local * (segment.to - segment.from),
            event: null,
            eventProgress: 0
          };
        }
        cursor += segment.ms;
      }
      return { year: maxYear, event: null, eventProgress: 0 };
    }

    function formatDisplayYear(year) {
      if (focusLocked && year >= 2022 && year < 2023) {
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthIndex = clamp(Math.floor((year - 2022) * 12), 0, 11);
        return `${monthNames[monthIndex]} 2022`;
      }
      return Math.floor(year).toString();
    }

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function loadPersistedIcons() {
      try {
        const savedIcons = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if (savedIcons["Peggy Guerrero"] && !savedIcons["Peggyann Guerrero"]) {
          savedIcons["Peggyann Guerrero"] = savedIcons["Peggy Guerrero"];
          delete savedIcons["Peggy Guerrero"];
        }
        Object.assign(iconDataUrls, savedIcons);
      } catch {
        localStorage.removeItem(storageKey);
      }
    }

    function persistIcons() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(iconDataUrls));
      } catch {
        alert("This browser could not save all icons locally. Try smaller image files, or use committed image assets for a hosted version.");
      }
    }

    function drawGrid() {
      const ticks = [1977, 1999, 2018, 2022, 2024];
      const bottom = plot.top + employees.length * plot.rowGap + 18;
      const originalDisplayYear = displayYear;
      displayYear = minYear;

      for (const year of ticks) {
        const x = xForYear(year);
        grid.appendChild(make("line", { class: "grid history-grid", x1: x, y1: 48, x2: x, y2: bottom }));
        const text = make("text", { class: "history-grid", x, y: bottom + 32, "text-anchor": "middle" });
        text.textContent = year;

      }

    function addFrame(group, fill = "#314761", scale = 1) {
      if (iconFrameStyle === "diamond") {
        group.appendChild(make("polygon", { class: "icon-ring", points: `0,${-32 * scale} ${32 * scale},0 0,${32 * scale} ${-32 * scale},0` }));
        group.appendChild(make("polygon", { class: "icon-accent", points: `0,${-26 * scale} ${26 * scale},0 0,${26 * scale} ${-26 * scale},0` }));
        return;
      }

      if (iconFrameStyle === "scallop") {
        group.appendChild(make("path", {
          class: "icon-ring",
          d: "M 0 -33 C 6 -27 12 -32 16 -25 C 18 -17 26 -20 28 -11 C 25 -2 34 3 29 12 C 22 17 27 24 17 28 C 9 28 6 35 0 30 C -6 35 -9 28 -17 28 C -27 24 -22 17 -29 12 C -34 3 -25 -2 -28 -11 C -26 -20 -18 -17 -16 -25 C -12 -32 -6 -27 0 -33 Z"
        }));
        group.appendChild(make("circle", { class: "icon-accent", cx: 0, cy: 0, r: 25 }));
        return;
      }

      group.appendChild(make("circle", { class: "icon-ring", cx: 0, cy: 0, r: 30 * scale }));
      group.appendChild(make("circle", { class: "icon-accent", cx: 0, cy: 0, r: 25 * scale }));
    }

    function placeholderIcon(group, fill = "#314761", scale = 1) {
      addFrame(group, fill, scale);
      group.appendChild(make("circle", { cx: 0, cy: -5 * scale, r: 11 * scale, fill }));
      group.appendChild(make("path", { d: `M ${-18 * scale} ${16 * scale} C ${-12 * scale} ${2 * scale} ${12 * scale} ${2 * scale} ${18 * scale} ${16 * scale} Z`, fill }));
      group.appendChild(make("circle", { cx: -5 * scale, cy: -5 * scale, r: 1.7 * scale, fill: "#fffdf7" }));
      group.appendChild(make("circle", { cx: 5 * scale, cy: -5 * scale, r: 1.7 * scale, fill: "#fffdf7" }));
    }

    function uploadedIcon(group, imageUrl, fill = "#314761", scale = 1) {
      addFrame(group, fill, scale);
      const imageSize = 52 * scale;
      const clipId = `iconClip-${Math.random().toString(36).slice(2)}`;
      const clip = make("clipPath", { id: clipId, clipPathUnits: "userSpaceOnUse" });
      clip.appendChild(make("circle", { cx: 0, cy: 0, r: 26 * scale }));
      group.appendChild(clip);
      group.appendChild(make("image", {
        class: "icon-image",
        href: imageUrl,
        x: -imageSize / 2,
        y: -imageSize / 2,
        width: imageSize,
        height: imageSize,
        "clip-path": `url(#${clipId})`,
        preserveAspectRatio: "xMidYMid slice"
      }));
    }

    function drawBurst(eventName, progress) {
      effects.innerHTML = "";
      svg.style.transformOrigin = "50% 50%";
      svg.style.transition = "none";

      if (!eventName) {
        svg.style.transform = "translate(0, 0)";
        return;
      }

      const centerX = eventName === "jen" ? xForYear(2017) : eventName === "kim-cody" ? xForYear(2021) : xForYear(2022);
      const centerY = eventName === "jen" ? plot.top + 6 * plot.rowGap : eventName === "kim-cody" ? plot.top + 7.5 * plot.rowGap : plot.top + 2.6 * plot.rowGap;
      const strength = eventName === "legacy-exit" ? 1.8 : 1.15;
      const pulse = Math.sin(progress * Math.PI);
      const shake = Math.sin(progress * Math.PI * 28) * 9 * pulse * strength;
      const lift = Math.cos(progress * Math.PI * 24) * 5 * pulse * strength;
      svg.style.transform = `translate(${shake}px, ${lift}px)`;

      const ringRadius = 70 + 780 * progress * strength;
      const screenOpacity = Math.max(0, Math.sin(progress * Math.PI) * 0.22);
      effects.appendChild(make("rect", {
        x: 0,
        y: 0,
        width: 1220,
        height: 640,
        fill: "#b4232f",
        opacity: screenOpacity
      }));
      effects.appendChild(make("circle", {
        class: "blast-ring",
        cx: centerX,
        cy: centerY,
        r: ringRadius,
        opacity: Math.max(0, 0.46 - progress * 0.44)
      }));
      effects.appendChild(make("circle", {
        class: "blast-ring",
        cx: centerX,
        cy: centerY,
        r: ringRadius * 0.42,
        opacity: Math.max(0, 0.36 - progress * 0.32)
      }));
      for (let i = 0; i < 9; i++) {
        const y = 92 + i * 48;
        effects.appendChild(make("line", {
          x1: 0,
          y1: y + Math.sin(progress * Math.PI * 8 + i) * 7 * pulse,
          x2: 1220,
          y2: y - Math.sin(progress * Math.PI * 8 + i) * 7 * pulse,
          stroke: "#b4232f",
          "stroke-width": 1.5,
          opacity: Math.max(0, 0.20 - progress * 0.17)
        }));
      }
    }

    function drawGameOver() {
      effects.innerHTML = "";

    function chevronPath(x, y, width, height, first, last) {
      const point = Math.min(22, width * 0.22);
      const notch = first ? 0 : point * 0.62;
      const right = last ? x + width : x + width - point;
      const tip = last ? x + width : x + width;
      const mid = y + height / 2;
      return [
        `M ${x + notch} ${y}`,
        `L ${right} ${y}`,
        last ? `L ${tip} ${y}` : `L ${tip} ${mid}`,
        `L ${right} ${y + height}`,
        `L ${x + notch} ${y + height}`,
        first ? `L ${x} ${y + height}` : `L ${x + point * 0.62} ${mid}`,
        first ? `L ${x} ${y}` : `L ${x + notch} ${y}`,
        "Z"
      ].join(" ");
    }

    function drawFinalTimeline() {
      finalTimelineShown = true;
      effects.innerHTML = "";
      svg.style.transform = "translate(0, 0)";
      document.getElementById("yearBadge").setAttribute("opacity", "0");
      story.classList.add("backdrop-blur");

      const F = "Inter, ui-sans-serif, system-ui, sans-serif";
      const spineY = 330;
      const x0 = 78, x1 = 1142;
      const xBreakL = 540, xBreakR = 600;

      // Two-section proportional scale: 1977–2018 compressed left, 2018–2023 expanded right
      const fx = yr => yr < 2018
        ? x0 + (yr - 1977) / (2018 - 1977) * (xBreakL - x0)
        : xBreakR + (yr - 2018) / (2023 - 2018) * (x1 - xBreakR);

      effects.appendChild(make("rect", { x: 0, y: 0, width: 1220, height: 640, fill: "#f8fafc", opacity: 0.98 }));

      const titleEl = make("text", { class: "final-title", x: 610, y: 56 });

      effects.appendChild(titleEl);
      const subtitleEl = make("text", { class: "final-subtitle", x: 610, y: 84 });
      subtitleEl.textContent = "Employment timeline — Orthopedic Surgery department";
      effects.appendChild(subtitleEl);

      // Left spine segment
      effects.appendChild(make("line", {
        x1: x0, y1: spineY, x2: xBreakL, y2: spineY,
        stroke: "#24364f", "stroke-width": 3.5, "stroke-linecap": "round", opacity: 0.80
      }));
      // Right spine segment
      effects.appendChild(make("line", {
        x1: xBreakR, y1: spineY, x2: x1, y2: spineY,
        stroke: "#24364f", "stroke-width": 3.5, "stroke-linecap": "round", opacity: 0.80
      }));
      // Arrowhead
      effects.appendChild(make("path", {
        d: `M ${x1} ${spineY} L ${x1 - 11} ${spineY - 7} M ${x1} ${spineY} L ${x1 - 11} ${spineY + 7}`,
        stroke: "#24364f", "stroke-width": 3.5, "stroke-linecap": "round", fill: "none", opacity: 0.80
      }));

      // Scale break: two diagonal slashes in the gap
      [[xBreakL + 5, xBreakL + 14], [xBreakR - 14, xBreakR - 5]].forEach(([xa, xb]) => {
        effects.appendChild(make("line", {
          x1: xa, y1: spineY + 13, x2: xb, y2: spineY - 13,
          stroke: "#8896a9", "stroke-width": 2, "stroke-linecap": "round"
        }));
      });
      const bkEl = make("text", {
        x: (xBreakL + xBreakR) / 2, y: spineY - 21, "text-anchor": "middle",
        fill: "#8896a9", "font-size": 10, "font-weight": 700, "font-family": F, "font-style": "italic"
      });
      bkEl.textContent = "scale break";
      effects.appendChild(bkEl);

      const renderEvent = ({ x, above, year, name, sub, color, featured }) => {
        const dotR = featured ? 9 : 6;
        const connLen = featured ? 72 : 54;
        const sign = above ? -1 : 1;
        const connY2 = spineY + sign * connLen;

        effects.appendChild(make("line", {
          x1: x, y1: spineY + sign * dotR, x2: x, y2: connY2,
          stroke: color, "stroke-width": featured ? 2.5 : 1.8, opacity: 0.75
        }));
        effects.appendChild(make("circle", {
          cx: x, cy: spineY, r: dotR,
          fill: color, stroke: "#f8fafc", "stroke-width": featured ? 3.5 : 2.5
        }));

        const yearY = above ? connY2 - 8 : connY2 + 20;
        const yearEl = make("text", {
          x, y: yearY, "text-anchor": "middle",
          fill: color, "font-size": featured ? 16 : 13, "font-weight": 900, "font-family": F
        });
        yearEl.textContent = year;
        effects.appendChild(yearEl);

        const nameY = above ? yearY - 20 : yearY + 19;
        const nameEl = make("text", {
          x, y: nameY, "text-anchor": "middle",
          fill: "#172033", "font-size": featured ? 14 : 12.5, "font-weight": featured ? 900 : 800, "font-family": F
        });
        nameEl.textContent = name;
        effects.appendChild(nameEl);

        if (sub) {
          const subY = above ? nameY - 16 : nameY + 17;
          const subEl = make("text", {
            x, y: subY, "text-anchor": "middle",
            fill: "#5d6677", "font-size": 11, "font-weight": 700, "font-family": F
          });
          subEl.textContent = sub;
          effects.appendChild(subEl);
        }
      };

      // Above spine: hires and joins
      [
        { yr: 1977,    year: "1977",     name: "Patricia Switzer",   sub: "hired",            color: "#1e40af" },
        { yr: 1992,    year: "1992",     name: "Guerrero & Johnson", sub: "hired",            color: "#0f766e" },
        { yr: 1999,    year: "1999",     name: "Vanessa Meadows",    sub: "hired",            color: "#d97706", featured: true },
        { yr: 2018,    year: "2018",     name: "Jenifer Ellner",     sub: "becomes director", color: "#dc2626" },
        { yr: 2021,    year: "2021",     name: "Cody Dayton",        sub: "joins",            color: "#57534e" },
        { yr: 2022,    year: "2022",     name: "K. Hanewinkel",      sub: "joins",            color: "#7f1d1d" },
        { yr: 2022.83, year: "Nov 2022", name: "Kortnie Sronce",     sub: "hired",            color: "#334155", featured: true },
      ].forEach(ev => renderEvent({ x: fx(ev.yr), above: true, ...ev }));

      // Below spine: hires and terminations
      [
        { yr: 2001,    year: "2001",     name: "Stokes & Daniel",  sub: "hired",                    color: "#0369a1" },
        { yr: 2019.22, year: "Apr 2019", name: "Doritha Daniel",   sub: "terminated by Ellner",     color: "#dc2626" },
        { yr: 2022.46, year: "Jun 2022", name: "Vanessa Meadows",  sub: "+ four others terminated", color: "#991b1b", featured: true },
      ].forEach(ev => renderEvent({ x: fx(ev.yr), above: false, ...ev }));

      // 5-month gap annotation between Jun 2022 termination and Sronce hire
      const xFired = fx(2022.46);
      const xSronce = fx(2022.83);
      const annotY = spineY - 22;
      effects.appendChild(make("line", {
        x1: xFired + 4, y1: annotY, x2: xSronce - 6, y2: annotY,
        stroke: "#6366f1", "stroke-width": 1.8, "stroke-dasharray": "5 3",
        "stroke-linecap": "round", opacity: 0.9
      }));
      effects.appendChild(make("line", { x1: xFired + 4, y1: annotY - 5, x2: xFired + 4, y2: annotY + 5, stroke: "#6366f1", "stroke-width": 1.8, "stroke-linecap": "round" }));
      effects.appendChild(make("line", { x1: xSronce - 6, y1: annotY - 5, x2: xSronce - 6, y2: annotY + 5, stroke: "#6366f1", "stroke-width": 1.8, "stroke-linecap": "round" }));
      const gapEl = make("text", {
        x: (xFired + xSronce) / 2, y: annotY - 9, "text-anchor": "middle",
        fill: "#4338ca", "font-size": 11.5, "font-weight": 800, "font-family": F
      });
      gapEl.textContent = "5-month gap";
      effects.appendChild(gapEl);

      const hint = make("text", { class: "final-hint", x: 610, y: 618 });
      hint.textContent = "Click or press Space to restart";
      effects.appendChild(hint);
    }

    function employeeByName(name) {
      return employees.find((emp) => emp.name === name);

    function phaseIcon(group, emp, x, y, scale, opacity = 1) {
      const gradientColors = {
        "Vanessa Meadows": "#d97706",
        "Patricia Switzer": "#1e40af",
        "Peggyann Guerrero": "#0f766e",
        "April Johnson": "#1d4ed8",
        "Cozetta Stokes": "#0369a1",
        "Doritha Daniel": "#115e59",
        "Jenifer Ellner": "#dc2626",
        "Kimberlee Hanewinkel": "#991b1b",

        "Kortnie Sronce": "#64748b"
      };
      const icon = make("g", {
        transform: `translate(${x} ${y})`,
        opacity
      });
      if (iconDataUrls[emp.name]) uploadedIcon(icon, iconDataUrls[emp.name], gradientColors[emp.name] || "#314761", scale);
      else placeholderIcon(icon, gradientColors[emp.name] || "#314761", scale);

    function addPhaseX(group, x, y, size = 92) {
      const mark = make("g", { class: "phase-x" });
      mark.appendChild(make("line", { x1: x - size, y1: y - size, x2: x + size, y2: y + size }));
      mark.appendChild(make("line", { x1: x + size, y1: y - size, x2: x - size, y2: y + size }));

    }

    function showPhaseOverlay(phase) {
      activePhase = phase;
      effects.innerHTML = "";
      svg.style.transform = "translate(0, 0)";

      const yearBadge = document.getElementById("yearBadge");
      yearBadge.setAttribute("opacity", "0.06");

      if (phase.variant === "firing-blast") {
        blastStartTime = null;
        blastComplete = false;
        return;
      }

      story.classList.add("backdrop-blur");
      grid.classList.add("backdrop-blur");
      bars.classList.add("backdrop-blur");
      icons.classList.add("backdrop-blur");
      effects.appendChild(make("rect", {
        class: "phase-veil",
        x: 0,
        y: 0,
        width: 1220,
        height: 640
      }));

      const titleLines = Array.isArray(phase.title) ? phase.title : [phase.title];
      titleLines.forEach((line, i) => {
        const title = make("text", {
          class: titleLines.length > 1 ? "phase-title long" : "phase-title",
          x: 610,
          y: titleLines.length > 1 ? 72 + i * 42 : 104
        });
        title.textContent = line;
        effects.appendChild(title);
      });

      const people = phase.people.map(employeeByName).filter(Boolean);
      const spacing = people.length > 3 ? 225 : people.length === 3 ? 345 : 390;
      const startX = 610 - ((people.length - 1) * spacing) / 2;
      const rendered = [];
      people.forEach((emp, i) => {
        const isDorithaFade = phase.variant === "fade-doritha" && emp.name === "Doritha Daniel";
        let scale = people.length > 3 ? 2.15 : people.length === 3 ? 3.05 : 3.25;
        if (phase.variant === "vanessa-fired") scale = 4.15;
        rendered.push(phaseIcon(effects, emp, startX + i * spacing, isDorithaFade ? 314 : 300, scale, isDorithaFade ? 0.16 : 1));
      });

      if (phase.variant === "fade-doritha" || phase.variant === "firing") {
        rendered.forEach((item) => {
          if (!item) return;
          if (phase.variant === "fade-doritha" && item.label.textContent !== "Doritha Daniel") return;
          addPhaseX(effects, item.x, item.y, phase.variant === "fade-doritha" ? 92 : 66);
        });
      }

    }

    function clearPhaseOverlay() {
      activePhase = null;
      effects.innerHTML = "";
      svg.style.transform = "translate(0, 0)";
      document.getElementById("yearBadge").setAttribute("opacity", "1");
      story.classList.remove("backdrop-blur");
      grid.classList.remove("backdrop-blur");

    function drawRows() {
      bars.innerHTML = "";
      icons.innerHTML = "";

      employees.forEach((emp, i) => {

        });

        });

        const gradientColors = ["#d97706", "#1e40af", "#0f766e", "#1d4ed8", "#0369a1", "#115e59", "#dc2626", "#991b1b", "#57534e", "#64748b"];
        if (iconDataUrls[emp.name]) {
          uploadedIcon(icon, iconDataUrls[emp.name], gradientColors[i], iconScale);
        } else {
          placeholderIcon(icon, gradientColors[i], iconScale);
        }
        const mark = make("g", { class: "timeline-x", "data-index": i, opacity: 0 });
        mark.appendChild(make("line", { x1: -18 * iconScale, y1: -18 * iconScale, x2: 18 * iconScale, y2: 18 * iconScale }));
        mark.appendChild(make("line", { x1: 18 * iconScale, y1: -18 * iconScale, x2: -18 * iconScale, y2: 18 * iconScale }));
        icon.appendChild(mark);
        icons.appendChild(icon);
      });
    }

    function drawFrame(now) {
      if (ended) {
        requestAnimationFrame(drawFrame);
        return;
      }

      if (activePhase) {
        if (activePhase.variant === "firing-blast" && !blastComplete) {
          if (blastStartTime === null) blastStartTime = now;
          const blastProgress = Math.min(1, (now - blastStartTime) / 2600);
          drawBurst(activePhase.event || null, blastProgress);
          document.getElementById("yearBadge").setAttribute("opacity", "0.06");
          if (blastProgress >= 1) {
            blastComplete = true;
            svg.style.transform = "translate(0, 0)";
          }
        }
        requestAnimationFrame(drawFrame);
        return;
      }

      if (!playing && pausedAt !== null) {
        requestAnimationFrame(drawFrame);
        return;
      }

      const elapsed = now - startTime;
      const nextPhase = phaseStops[phaseIndex];
      if (nextPhase && elapsed >= nextPhase.elapsed) {
        currentElapsed = nextPhase.elapsed;
        renderTimelineState({ ...timelineState(nextPhase.elapsed), event: nextPhase.event || null, eventProgress: 0.58 });
        playing = false;
        pausedAt = performance.now();
        playPause.textContent = "Continue / Space";
        showPhaseOverlay(nextPhase);
        requestAnimationFrame(drawFrame);
        return;
      }

      if (elapsed >= durationMs) {
        const state = { year: maxYear, event: null, eventProgress: 0 };
        renderTimelineState(state);
        drawFinalTimeline();
        ended = true;
        playing = false;
        pausedAt = performance.now();
        yearText.textContent = maxYear.toString();
        playPause.textContent = "Restart / Space";
        requestAnimationFrame(drawFrame);
        return;
      }

      const state = timelineState(elapsed);
      currentElapsed = elapsed;
      renderTimelineState(state);
      requestAnimationFrame(drawFrame);
    }

    function renderTimelineState(state) {
      const currentYear = state.year;
      displayYear = currentYear;
      yearText.textContent = formatDisplayYear(currentYear);
      drawBurst(state.event, state.eventProgress);

      const bottom = plot.top + employees.length * plot.rowGap + 18;
      const nowLine = document.getElementById("nowLine");
      const nowX = xForYear(clamp(currentYear, focusLocked ? focusStartYear : minYear, focusLocked ? focusEndYear : maxYear));
      nowLine.setAttribute("x1", nowX);
      nowLine.setAttribute("x2", nowX);
      nowLine.setAttribute("y2", bottom);
      grid.querySelectorAll(".history-grid").forEach((node) => node.setAttribute("opacity", focusLocked ? 0 : 1));
      grid.querySelectorAll(".focus-grid").forEach((node) => node.setAttribute("opacity", focusLocked ? 1 : 0));

      employees.forEach((emp, i) => {
        const rowY = plot.top + i * plot.rowGap;
        const range = visibleRangeForEmployee(emp);
        const startX = range.visible ? xForYear(range.start) : xForYear(focusStartYear);
        const endYear = tenureEndYear(emp);
        const endX = range.visible ? xForYear(range.end) : startX;
        const progress = clamp((currentYear - emp.start) / (endYear - emp.start), 0, 1);
        const activeYear = clamp(currentYear, Math.max(emp.start, focusLocked ? focusStartYear : minYear), Math.min(endYear, focusLocked ? focusEndYear : maxYear));
        const x = xForYear(activeYear);
        const isKeeper = emp.name === "Jenifer Ellner" || emp.name === "Kimberlee Hanewinkel" || emp.name === "Cody Dayton" || emp.name === "Kortnie Sronce";
        const isDoritha = emp.name === "Doritha Daniel";
        const isVanessa = emp.name === "Vanessa Meadows";
        const visualExitYear = endYear;
        const exitWindow = focusLocked && visualExitYear >= 2022 ? 0.24 : 0.45;
        const exitProgress = isKeeper ? 0 : clamp((currentYear - visualExitYear) / exitWindow, 0, 1);
        const exitLift = -36 * exitProgress;
        const exitDrift = 38 * exitProgress;
        const exitOpacity = 1 - 0.88 * exitProgress;

        const bar = bars.querySelector(`.bar[data-index="${i}"]`);
        const icon = icons.querySelector(`.icon-shell[data-index="${i}"]`);
        const label = bars.querySelector(`.bar-label[data-index="${i}"]`);
        const track = bars.querySelector(`.track[data-index="${i}"]`);
        const name = bars.querySelector(`.name[data-index="${i}"]`);
        const duration = bars.querySelector(`.duration[data-index="${i}"]`);
        const mark = icons.querySelector(`.timeline-x[data-index="${i}"]`);

        const trackWidth = Math.max(0, endX - startX);
        const visibleWidth = range.visible ? Math.max(0, Math.min(x, endX) - startX) : 0;
        track.setAttribute("x", startX);
        track.setAttribute("width", trackWidth);
        bar.setAttribute("x", startX);
        bar.setAttribute("width", visibleWidth);
        label.setAttribute("x", startX + 12);
        icon.setAttribute("transform", `translate(${x + exitDrift} ${rowY + exitLift}) scale(${1 - 0.22 * exitProgress})`);
        icon.setAttribute("opacity", exitOpacity);
        bar.setAttribute("opacity", exitOpacity);
        mark.setAttribute("opacity", exitProgress > 0 ? Math.min(1, 0.25 + exitProgress) : 0);

        if (!isKeeper && currentYear > visualExitYear) {
          bar.classList.add("legacy-dim");
          track.classList.add("legacy-dim");
          name.classList.add("legacy-dim");
          duration.classList.add("legacy-dim");
          label.classList.add("legacy-dim");
        } else {
          bar.classList.remove("legacy-dim");
          track.classList.remove("legacy-dim");
          name.classList.remove("legacy-dim");
          duration.classList.remove("legacy-dim");
          label.classList.remove("legacy-dim");
        }

        if (progress > 0.18) label.classList.add("visible");
        else label.classList.remove("visible");
      });

    }

    function continuePhase() {
      if (!activePhase) return false;
      if (activePhase.variant === "firing-blast" && !blastComplete) return true;
      const finishedPhase = activePhase;
      clearPhaseOverlay();
      blastStartTime = null;
      blastComplete = false;
      phaseIndex += 1;
      if (finishedPhase.variant === "fade-doritha") {
        focusLocked = true;
      }

      const nextPhase = phaseStops[phaseIndex];
      if (nextPhase && nextPhase.elapsed === finishedPhase.elapsed) {
        renderTimelineState({ ...timelineState(nextPhase.elapsed), event: nextPhase.event || null, eventProgress: 0.58 });
        showPhaseOverlay(nextPhase);
        playPause.textContent = "Continue / Space";
        return true;
      }

      playing = true;
      pausedAt = null;
      currentElapsed = finishedPhase.elapsed;
      startTime = performance.now() - currentElapsed;
      playPause.textContent = "Pause / Space";
      return true;
    }

    function togglePlayback() {
      if (continuePhase()) return;

      if (!hasStarted) {
        hasStarted = true;
        playing = true;
        pausedAt = null;
        startTime = performance.now();
        playPause.textContent = "Pause / Space";
        return;
      }

      if (ended) {
        startTime = performance.now();
        pausedAt = null;
        ended = false;
        hasStarted = true;
        phaseIndex = 0;
        activePhase = null;
        focusLocked = false;
        finalTimelineShown = false;
        blastStartTime = null;
        blastComplete = false;
        currentElapsed = 0;
        playing = true;
        effects.innerHTML = "";
        svg.style.transform = "translate(0, 0)";
        document.getElementById("yearBadge").setAttribute("opacity", "1");
        story.classList.remove("backdrop-blur");
        grid.classList.remove("backdrop-blur");
        bars.classList.remove("backdrop-blur");
        icons.classList.remove("backdrop-blur");
        renderTimelineState({ year: minYear, event: null, eventProgress: 0 });
        playPause.textContent = "Pause / Space";
        return;
      }
      playing = !playing;
      playPause.textContent = playing ? "Pause / Space" : "Play / Space";
      if (!playing) {
        pausedAt = performance.now();
      } else {
        startTime += performance.now() - pausedAt;
        pausedAt = null;
      }
    }

    playPause.addEventListener("click", () => {
      togglePlayback();
    });

    window.addEventListener("keydown", (event) => {
      const target = event.target;
      const isTyping = target && (target.tagName === "INPUT" || target.tagName === "SELECT" || target.tagName === "TEXTAREA");
      if (event.code === "Space" && !isTyping) {
        event.preventDefault();
        togglePlayback();
      }
      if (event.ctrlKey && event.key.toLowerCase() === "h" && !isTyping) {
        event.preventDefault();
        const nextHidden = !controls.classList.contains("hidden");
        controls.classList.toggle("hidden", nextHidden);
        showControlsBtn.classList.toggle("hidden", !nextHidden);
      }
    });

    restart.addEventListener("click", () => {
      startTime = performance.now();
      pausedAt = null;
      ended = false;
      phaseIndex = 0;
      activePhase = null;
      focusLocked = false;
      finalTimelineShown = false;
      blastStartTime = null;
      blastComplete = false;
      currentElapsed = 0;
      hasStarted = false;
      playing = false;
      pausedAt = performance.now();
      effects.innerHTML = "";
      svg.style.transform = "translate(0, 0)";
      document.getElementById("yearBadge").setAttribute("opacity", "1");
      story.classList.remove("backdrop-blur");
      grid.classList.remove("backdrop-blur");
      bars.classList.remove("backdrop-blur");
      icons.classList.remove("backdrop-blur");
      renderTimelineState({ year: minYear, event: null, eventProgress: 0 });
      playPause.textContent = "Start / Space";
    });

    stage.addEventListener("click", (event) => {
      if (event.target.closest("button, select, label, input")) return;
      if (ended) {
        togglePlayback();
        return;
      }
      if (!activePhase) return;
      continuePhase();
    });

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await stage.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreenBtn.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
    });

    hideControlsBtn.addEventListener("click", () => {
      controls.classList.add("hidden");
      showControlsBtn.classList.remove("hidden");
    });

    showControlsBtn.addEventListener("click", () => {
      controls.classList.remove("hidden");
      showControlsBtn.classList.add("hidden");
    });

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function detectFaceBox(img) {
      if (!("FaceDetector" in window)) return null;
      try {
        const detector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
        const faces = await detector.detect(img);
        if (!faces || !faces.length) return null;
        return faces[0].boundingBox;
      } catch {
        return null;
      }
    }

    async function makePortraitIcon(src) {
      const img = await loadImage(src);
      const face = await detectFaceBox(img);
      const canvas = document.createElement("canvas");
      const size = 320;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      let cropSize;
      let centerX;
      let centerY;

      if (face) {
        cropSize = Math.max(face.width, face.height) * 2.05;
        centerX = face.x + face.width / 2;
        centerY = face.y + face.height * 0.48;
      } else {
        cropSize = Math.min(img.naturalWidth, img.naturalHeight);
        centerX = img.naturalWidth / 2;
        centerY = img.naturalHeight / 2;
      }

      cropSize = Math.min(cropSize, img.naturalWidth, img.naturalHeight);
      let sx = centerX - cropSize / 2;
      let sy = centerY - cropSize / 2;
      sx = clamp(sx, 0, img.naturalWidth - cropSize);
      sy = clamp(sy, 0, img.naturalHeight - cropSize);

      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, sx, sy, cropSize, cropSize, 0, 0, size, size);
      return canvas.toDataURL("image/png");
    }

    upload.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const selectedPerson = iconPerson.value;
      const reader = new FileReader();
      reader.onload = async () => {
        iconDataUrls[selectedPerson] = await makePortraitIcon(reader.result);
        persistIcons();
        upload.value = "";
        drawRows();
        if (!activePhase) renderTimelineState(timelineState(currentElapsed));
        if (activePhase) showPhaseOverlay(activePhase);
      };
      reader.readAsDataURL(file);
    });

    loadPersistedIcons();
    drawGrid();
    drawRows();
    requestAnimationFrame(drawFrame);
  </script>
</body>
</html>
